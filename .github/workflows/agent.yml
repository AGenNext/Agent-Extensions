name: Repo Agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: Task for the agent
        required: false
        type: string

  issue_comment:
    types:
      - created

  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  agent:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '/agent')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Print command
        run: |
          echo "Agent workflow triggered"
          echo "${{ github.event.comment.body }}"
