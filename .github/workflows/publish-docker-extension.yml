name: Publish Docker Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/docker-extension/**
      - .github/workflows/publish-docker-extension.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker extension image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/docker-extension
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent-docker-extension:latest
            ghcr.io/${{ github.repository_owner }}/agent-docker-extension:${{ github.sha }}

      - name: Print verification command
        run: |
          echo "docker pull ghcr.io/${{ github.repository_owner }}/agent-docker-extension:latest"
