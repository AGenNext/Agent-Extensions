name: Build Docker Extension

on:
  push:
    branches:
      - main
    paths:
      - apps/docker-extension/**
      - .github/workflows/docker-extension.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/docker-extension
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/agent-docker-extension:latest
